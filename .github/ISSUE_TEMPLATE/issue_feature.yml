name: 📝 Custom Issue
description: 일반적인 작업이나 개선 이슈를 작성합니다.
title: "[Issue] "
labels: ["issue"]
body:
  - type: markdown
    attributes:
      value: |
        ### 이슈 설명
        
        이슈 설명을 아래에 자세히 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 📄 이슈 설명
      description: 어떤 작업이 필요한지, 왜 필요한지 명확하게 적어주세요.
      placeholder: 여기에 작성...
    validations:
      required: true

  - type: checkboxes
    id: todo
    attributes:
      label: ✅ TODO
      description: 수행해야 할 작업을 체크리스트로 작성하세요.
      options:
        - label: TODO 1